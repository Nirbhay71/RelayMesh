services:
  # Redis-Stack: Single container for Redis + Redis Insight
  redis:
    image: redis/redis-stack:latest
    container_name: redis-relaymesh
    ports:
      - "6379:6379"   # Redis Port
      - "8001:8001"   # Redis Insight Port
    environment:
      - REDIS_ARGS="--appendonly yes"
    volumes:
      - redis-data:/data
    restart: always

  mongo:
    image: mongo:7
    container_name: mongodb-relaymesh
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDBBASE: relaymesh_db
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data:
  redis-data: